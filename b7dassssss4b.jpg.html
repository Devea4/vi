<title>Click to Watch 😈</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f9f9f9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  margin: 0;
}

.container {
  max-width: 360px;
  width: 100%;
  text-align: center;
}

/* JUDUL */
h1 {
  font-size: 20px;
  margin-bottom: 10px;
}

/* TOMBOL */
.download-btn {
  display: block;
  margin: 12px 0;
  padding: 15px;
  background: #ff0000;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 16px;
}

/* VIDEO */
.video-box {
  position: relative;
  cursor: pointer;
}

.video-box img {
  width: 100%;
  border-radius: 12px;
  display: block;
}

/* overlay */
.video-box::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
}

/* PLAY BUTTON */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 65px;
  height: 65px;
  background: rgba(255,0,0,0.9);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

.play-btn::before {
  content: "";
  border-left: 18px solid white;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  margin-left: 4px;
}
</style>
</head>

<body>

<div class="container">

  <!-- JUDUL -->
  <h1>👇 Click Link to Watch 👇</h1>

  <!-- TOMBOL (LANGSUNG KELIHATAN) -->
  <a href="https://videykoje.blogspot.com/2026/04/smashing-her-her-bestfriend.html" class="download-btn">
    WATCH NOW 💯
  </a>

  <!-- GAMBAR VIDEO (AREA KLIK BESAR) -->
  <div class="video-box" onclick="window.location.href='https://videykoje.blogspot.com/2026/04/smashing-her-her-bestfriend.html'">
    <img src="https://cdn.aceimg.com/caeb7da4b.jpg" alt="thumbnail">
    <div class="play-btn"></div>
  </div>

</div>
